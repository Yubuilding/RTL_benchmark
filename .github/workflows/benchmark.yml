name: RTL Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_COMPATIBLE_API_KEY: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Build evaluator image
        run: |
          docker build -t rtl-benchmark-tools:latest .

      - name: Run benchmark
        run: |
          python -m rtl_benchmark.cli run --config configs/pipeline.realtime.json

      - name: Show leaderboard
        run: |
          python -m rtl_benchmark.cli rank --leaderboard results/leaderboard.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rtl-benchmark-results
          path: |
            results/leaderboard.json
            results/raw/
            results/runs/
